<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud-Based Website Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Company Support Chatbot</h1>
    <p class="subtitle">Instant customer support for commercial websites</p>

    <div class="chat-container">
      <div class="chat-header">AI Support Assistant</div>

      <div class="chat-box" id="chatBox">
        <div class="message bot">
          Hello! Welcome to our website. How can I help you today?
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Type your message here...">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
