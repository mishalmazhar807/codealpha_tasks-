<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✨ Image Gallery</h1>

<!-- FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
  <button onclick="filterImages('animals')">Animals</button>
  <button onclick="filterImages('food')">Food</button>
</div>

<!-- GALLERY -->
<div class="gallery">

<!-- NATURE -->
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="image nature" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="image nature" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" class="image nature" onclick="openLightbox(this)">

<!-- CITY -->
<img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b" class="image city" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1444723121867-7a241cacace9" class="image city" onclick="openLightbox(this)">

<!-- ANIMALS -->

<!-- ANIMALS -->
<img src="https://images.unsplash.com/photo-1564349683136-77e08dba1ef7" class="image animals" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d" class="image animals" onclick="openLightbox(this)">

<!-- FOOD -->
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" class="image food" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349" class="image food" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe" class="image food" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1473093226795-af9932fe5856" class="image food" onclick="openLightbox(this)">

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span onclick="closeLightbox()">✖</span>
  <img id="lightbox-img">
  <button onclick="prevImage()">⬅</button>
  <button onclick="nextImage()">➡</button>
</div>

<script src="script.js"></script>
</body>
</html>
